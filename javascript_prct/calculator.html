<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Spartan:wght@100..900&family=Outfit:wght@100..900&family=Young+Serif&display=swap"
      rel="stylesheet"
    />

    <title>Calculator app</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "League Spartan", sans-serif;
        font-optical-sizing: auto;
      }
      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: hsl(0, 0%, 93%);
      }
      .calculator{
      width: 260px;
      }
      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        background-color: hsl(0, 5%, 81%);
        padding: 12px;
        border-radius: 10px;
      }

      button {
        padding: 10px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        background: hsl(0, 0%, 90%);
        cursor: pointer;
        box-shadow: 0px 3px 1px hsl(35, 11%, 61%);
      }

      button:hover {
        background: #ccc;
      }

      .reset {
        grid-column: span 2;
        background: #4da6a6;
        color: white;
      }

      .equal {
        grid-column: span 2;
        background: #ff8c3a;
        color: white;
      }

      #display {
        width: 100%;
        height: 50px;
        font-size: 22px;
        margin-bottom: 15px;
        text-align: right;
        padding: 10px;
        background-color: hsl(0, 0%, 99%);
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <section class="calculator">
      <h2>calc</h2>
      <input type="text" id="display" readonly />
      <div class="buttons">
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="del()">DEL</button>
        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('+')">+</button>
        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('-')">-</button>
        <button onclick="append('.')">.</button>
        <button onclick="append('0')">0</button>
        <button onclick="append('/')">/</button>
        <button onclick="append('*')">*</button>
        <button class="reset" onclick="reset()">RESET</button>
        <button class="equal" onclick="calculate_result()">=</button>
      </div>
    </section>
    <script>
      let display = document.getElementById("display");

      function append(value) {
        display.value += value;
      }

      function del() {
        display.value = display.value.slice(0, -1);
      }

      function reset() {
        display.value = "";
      }

      function calculate_result() {
        display.value = eval(display.value);
      }
    </script>
  </body>
</html>
