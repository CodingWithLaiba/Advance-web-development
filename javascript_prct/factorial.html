      //Factorial of a Number Code 2

      function factorial(number) {
        let result = 1;
        let sequence = "";
        for (let i = number; i >= 1; i--) {
          result *= i;
          sequence += i + (i > 1 ? "x" : "");
        }
        document.write(number + "!=" + sequence + "=" + result + "<br> <br>");
      }
      factorial(3); //3!=3x2x1=6

      //Palindrome Number

      function isPalindrome(num) {
        let string = num.toString();
        let reverse = string.split("").reverse().join("");
        document.write(
          string == reverse
            ? num + " is a Palindrome <br>"
            : num + " is not a Palindrome<br>",
        );
      }
      isPalindrome(1331);
      isPalindrome(121);
