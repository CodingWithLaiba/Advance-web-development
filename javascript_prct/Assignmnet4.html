      // code 2

      let string = "hello";
      let reverse = "";
      for (let i = string.length - 1; i >= 0; i--) {
        reverse += string[i];
      }
      document.write("Original String is : " + string + "<br>");
      document.write("Reverse String is : " + reverse + "<br>");


      // Write a JavaScript program to  Find Largest Number in Array
      //Code 1

      // const number = [10, 50, 20, 90, 40];
      // const largestNum = Math.max(...number);
      // document.write("The largest number is :"+ largestNum + "<br>"
      // );

      //Code 2
      let number = [10, 50, 20, 90, 40];
      let largest = number[0];

      for (let i = 1; i < number.length; i++) {
        if (number[i] > largest) {
          largest = number[i];
        }
      }

      document.write("The largest number is: " + largest + "<br>");

      // Write a JavaScript program to print up to 10 terms.Fibonacci series
      function Fibonacci_series() {
        let num1 = 0;
        let num2 = 1;
        document.write(num1);
        document.write(num2);
        for (let i = 3; i <= 10; i++) {
          let num = num1 + num2;
          document.write(num);
          num1 = num2;
          num2 = num;
        }
      }
      document.write("Fibonacci series is : ");
      Fibonacci_series();
