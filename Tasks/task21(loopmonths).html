<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function DisplayMonths() {
        let months = [
          "Januray",
          "Feburay",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December",
        ];
        for (let i = 0; i < months.length; i++) {
          document.write(months[i] + "<br>");
        }
      }
      DisplayMonths();
    </script>
  </body>
</html>
