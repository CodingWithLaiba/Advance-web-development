<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p class="month"></p>
    <script>
        document.write("Laiba Ijaz <br>");

        let time= new Date().getHours
        if(time<=12){
            document.write("Good Morning");
        }else{
            document.write("Good Affernoon");
        }


function showMonths() {
        let months= ["January", "February", "March", "April",
        "May", "June", "July", "August",
        "September", "October", "November", "December"];
        let result = "";
        for(let i=0 ; i<months.length; i++){
            result += months[i] + " ";
        }
        document.getElementsByClassName("month")[0].innerHTML= result;
    }
    showMonths();
    </script>
</body>
</html>
