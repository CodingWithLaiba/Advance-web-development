<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>
  <body>
    <button id="slidebtn">click me to show content</button>
    <p class="content" style="display: none;">I am content</p>
    <script>
      $("#slidebtn").click(function () {
        $(".content").slideToggle();
      });
    </script>
  </body>
</html>
