<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Skills Progress Bar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        
        <h2 class="text-center mb-4">Coding Skills</h2>

        <!-- HTML -->
        <label class="fw-bold">HTML</label>
        <div class="progress mb-3" style="height: 25px;">
            <div class="progress-bar bg-success" style="width: 90%;">
                90%
            </div>
        </div>

        <!-- CSS -->
        <label class="fw-bold">CSS</label>
        <div class="progress mb-3" style="height: 25px;">
            <div class="progress-bar bg-info" style="width: 80%;">
                80%
            </div>
        </div>

        <!-- JavaScript -->
        <label class="fw-bold">JavaScript</label>
        <div class="progress mb-3" style="height: 25px;">
            <div class="progress-bar bg-warning" style="width: 70%;">
                70%
            </div>
        </div>

        <!-- Python -->
        <label class="fw-bold">Python</label>
        <div class="progress mb-3" style="height: 25px;">
            <div class="progress-bar bg-primary" style="width: 85%;">
                85%
            </div>
        </div>

        <!-- C++ -->
        <label class="fw-bold">C++</label>
        <div class="progress mb-3" style="height: 25px;">
            <div class="progress-bar bg-danger" style="width: 65%;">
                65%
            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
