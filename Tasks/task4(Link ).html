<!doctype html>
<html>
  <head>
    <title>Links Example</title>
  </head>
  <body>
    <!-- 1. Local Link (file in same folder) -->
    <a href="task1head.html" target="_self" title="Open Local File">
      Open Local File
    </a>

    <br /><br />

    <!-- 2. Link to Higher Level Directory -->
    <a
      href="../Coffee/index.html"
      target="_self"
      title="Go to Parent Directory"
    >
      Go to Parent Directory
    </a>

    <br /><br />

    <!-- 3. Link to Internet Website -->
    <a href="https://www.google.com" target="_blank" title="Visit Google">
      Visit Google
    </a>

    <br /><br />

    <!-- 4. Email Link -->
    <a
      href="mailto:laibaijaz904@gmail.com?subject=Hello&body=Message here"
      title="Send Email"
    >
      Send Email
    </a>
  </body>
</html>
