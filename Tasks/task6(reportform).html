<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Report</title>
    <style>
      h3 {
        text-align: center;
      }
      caption {
        font-size: 24px;
        font-weight: normal;
        color: white;
        background-color: green;
      }
      table {
        width: 530px;
        margin: 20px auto;
        border-collapse: collapse;
        border: 1px solid #000;
        table-layout: fixed;
        font-size: 11px;
      }

      td {
        border: 1px solid #000;

        width: 60%;
      }
      th {
        border: 1px solid #000;
        text-align: right;
        width: 40%;
        vertical-align: top;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>Report Form</h3>

      <table>
        <caption>
          INFORMATION TABLE
        </caption>
        <tr>
          <th>Name</th>
          <td>
            <input type="text" id="name" /><br />
            <label for="name">Enter your full name</label>
          </td>
        </tr>
        <tr>
          <th>Email</th>
          <td>
            <input type="email" id="email" /><br />
            <label for="email">Enter your email address</label>
          </td>
        </tr>
        <tr>
          <th>Phone Number</th>
          <td>
            <input type="tel" id="phone" /><br />
            <label for="phone">Enter your phone number</label>
          </td>
        </tr>
        <tr>
          <th>Address</th>
          <td>
            <input type="text" id="address" /><br />
            <label for="address">Enter your address</label>
          </td>
        </tr>
        <tr>
          <th>Country</th>
          <td>
            <select name="country" id="country">
              <option value="Pakistan">Pakistan</option>
              <option value="USA">USA</option>
              <option value="Canada">Canada</option>
              <option value="UK">UK</option>
              <option value="Australia">Australia</option>
              <option value="India">India</option>
            </select>
          </td>
        </tr>
        <tr>
          <th>Gender</th>
          <td>
            <input type="radio" id="male" name="gender" value="male" />
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female" />
            <label for="female">Female</label>
          </td>
        </tr>
        <tr>
          <th>Hobbies</th>
          <td>
            <input type="checkbox" id="hobby1" name="hobby" value="Reading" />
            <label for="hobby1">Reading</label><br />
            <input
              type="checkbox"
              id="hobby2"
              name="hobby"
              value="Listening to Music"
            />
            <label for="hobby2">Listening to Music</label><br />
            <input type="checkbox" id="hobby3" name="hobby" value="Gardening" />
            <label for="hobby3">Gardening</label><br />
            <input type="checkbox" id="hobby4" name="hobby" value="Swimming" />
            <label for="hobby4">Swimming</label><br />
            Check all that apply
          </td>
        </tr>
        <tr>
          <th>Your Website</th>
          <td>
            <input type="url" id="website" /><br />
            <label for="website">Provide your website URL</label>
          </td>
        </tr>
        <tr>
          <th>Other Information about you</th>
          <td>
            <textarea
              name="otherInfo"
              id="otherInfo"
              rows="4"
              cols="20"
            ></textarea
            ><br />
            <label for="otherInfo"
              >Write any additional information about yourself</label
            >
          </td>
        </tr>
        <tr>
          <th><input type="submit" value="Send in my report" /></th>
          <td><input type="reset" value="erase foam" /></td>
        </tr>
      </table>
    </div>
  </body>
</html>
