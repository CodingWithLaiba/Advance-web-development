<!DOCTYPE html>
<html>
<head>
    <title>Nested Dropdown Menu</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            background: #333;
        }

        ul li {
            position: relative;
            display: inline-block;
        }

        ul li a {
            display: block;
            padding: 15px 20px;
            color: white;
            text-decoration: none;
        }

        ul li:hover {
            background: #555;
        }

        /* First Dropdown */
        ul li ul {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #444;
            min-width: 180px;
        }

        ul li:hover > ul {
            display: block;
        }

        ul li ul li {
            display: block;
        }

        /* Nested Dropdown */
        ul li ul li ul {
            top: 0;
            left: 100%;
            background: #666;
        }
    </style>
</head>

<body>

    <ul>
        <li><a href="#">Home</a></li>

        <li>
            <a href="#">Courses</a>

            <ul>
                <li><a href="#">HTML</a></li>
                <li><a href="#">CSS</a></li>

                <li>
                    <a href="#">Programming ▶</a>

                    <ul>
                        <li><a href="#">Java</a></li>
                        <li><a href="#">Python</a></li>
                        <li><a href="#">JavaScript</a></li>
                    </ul>

                </li>
            </ul>

        </li>

        <li><a href="#">Contact</a></li>
    </ul>

</body>
</html>
